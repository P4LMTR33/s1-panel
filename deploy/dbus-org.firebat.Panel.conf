<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow the firebat-paneld daemon to own the bus name -->
  <policy user="root">
    <allow own="org.firebat.Panel"/>
    <allow send_destination="org.firebat.Panel"/>
    <allow send_interface="org.firebat.Panel1"/>
  </policy>

  <!-- Allow users in the 'firebat-panel' group to send commands -->
  <policy group="firebat-panel">
    <allow send_destination="org.firebat.Panel"/>
    <allow send_interface="org.firebat.Panel1"/>
  </policy>

  <!-- Deny everyone else by default (system bus already does this) -->
  <policy context="default">
    <deny send_destination="org.firebat.Panel"/>
  </policy>
</busconfig>
