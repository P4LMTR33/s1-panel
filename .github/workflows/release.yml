name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release
        run: cargo build --release

      - name: Determine project name and version
        id: meta
        run: |
          PROJECT=$(cargo metadata --no-deps --format-version 1 \
                    | jq -r '.packages[0].name')
          VERSION=${GITHUB_REF#refs/tags/}
          TARGET=x86_64-unknown-linux-gnu
          ARCHIVE="${PROJECT}-${VERSION}-${TARGET}"
          echo "PROJECT=${PROJECT}"   >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}"   >> "$GITHUB_OUTPUT"
          echo "ARCHIVE=${ARCHIVE}"   >> "$GITHUB_OUTPUT"

      - name: Package release archive
        run: |
          DIR=${{ steps.meta.outputs.ARCHIVE }}
          mkdir -p "${DIR}/target/release"

          # копируем собранные бинарники (исключаем служебные файлы)
          for bin in target/release/*; do
            [ -f "$bin" ] && [ -x "$bin" ] \
              && [[ ! "$bin" =~ \.(d|rlib|rmeta|so)$ ]] \
              && [[ ! "$(basename "$bin")" == build_script_build ]] \
              && cp "$bin" "${DIR}/target/release/"
          done

          # сопроводительные файлы/каталоги (если существуют)
          [ -d config ]    && cp -r config    "${DIR}/"
          [ -d deploy ]    && cp -r deploy    "${DIR}/"
          [ -f Makefile ]  && cp    Makefile   "${DIR}/"
          [ -f README.md ] && cp    README.md  "${DIR}/"
          [ -f LICENSE ]   && cp    LICENSE    "${DIR}/"

          tar -czf "${DIR}.tar.gz" "${DIR}"
          echo "ASSET=${DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.PROJECT }} ${{ steps.meta.outputs.VERSION }}
          files: ${{ env.ASSET }}
          generate_release_notes: true
